<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Typography Analyzer</title>

<style>
body { font-family: Arial; background:#f5f5f5; }
.container { max-width:1000px; margin:auto; padding:20px; background:white; margin-top:40px; border-radius:10px; }

input, button { width:100%; padding:10px; margin-top:10px; }
button { background:black; color:white; cursor:pointer; }

.element { background:#eee; padding:10px; margin:10px 0; }

.ai {
    background:black;
    color:#00ff88;
    padding:15px;
    margin-top:20px;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>AI Typography Analyzer 🤖</h1>

<input id="urlInput" placeholder="https://example.com">
<button onclick="analyze()">Analyze</button>

<div id="result"></div>

</div>

<script>

async function analyze(){
    const url = document.getElementById("urlInput").value;
    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "Loading...";

    const res = await fetch("https://web-typography-analyzer-production.up.railway.app/analyze?url="+encodeURIComponent(url));
    const data = await res.json();

    if(data.error){
        resultDiv.innerHTML = data.error;
        return;
    }

    let html = "<h2>Elements</h2>";

    data.elements.slice(0,20).forEach(el=>{
        html += `
        <div class="element">
            <b>${el.tag}</b><br>
            ${el.text}<br>
            Size: ${el.fontSize} | Line: ${el.lineHeight}
        </div>`;
    });

    html += `
    <h2>🤖 AI Analysis</h2>
    <div class="ai">${data.ai}</div>
    `;

    html += `<h2>Screenshot</h2>
    <img src="https://web-typography-analyzer-production.up.railway.app/highlight.png" width="100%">`;

    resultDiv.innerHTML = html;
}

</script>

</body>
</html>
