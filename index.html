<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Typography Analyzer</title>

<style>
body { font-family: Arial; background:#f5f5f5; }
.container { max-width:1000px; margin:auto; padding:20px; background:white; margin-top:40px; border-radius:10px; }

input, button { width:100%; padding:10px; margin-top:10px; }
button { background:black; color:white; cursor:pointer; }

.analysis-box {
    padding:15px;
    margin:15px 0;
    border-radius:8px;
    color:white;
}

.analysis-box.good { background:green; }
.analysis-box.needs { background:red; }
</style>
</head>

<body>

<div class="container">

<h1>Typography Analyzer</h1>

<input id="urlInput" placeholder="https://example.com">
<button onclick="analyze()">Analyze</button>

<div id="result"></div>

</div>

<script>

async function analyze(){
    const url = document.getElementById("urlInput").value;
    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "Loading...";

    const response = await fetch("https://web-typography-analyzer.onrender.com/analyze?url="+encodeURIComponent(url));
    const data = await response.json();

    let html="";

    data.elements.forEach(el=>{
        let status="good";
        let problems=[];
        let fixes=[];

        if(parseFloat(el.fontSize)<14){
            status="needs";
            problems.push("Font too small");
            fixes.push("Use 14–16px");
        }

        if(el.contrast < 4.5){
            status="needs";
            problems.push("Low contrast");
            fixes.push("Improve contrast");
        }

        if(parseFloat(el.lineHeight)<1.3){
            status="needs";
            problems.push("Line height too small");
            fixes.push("Use 1.4–1.6");
        }

        html += `
        <div class="analysis-box ${status}">
            <b>${el.tag}</b><br>
            "${el.text}"<br><br>
            Size: ${el.fontSize}<br>
            Contrast: ${el.contrast}<br><br>
            Problems: ${problems.join(", ") || "None"}<br>
            Fix: ${fixes.join(", ") || "None"}
        </div>`;
    });

    html += `<h2>Highlight</h2>
    <img src="https://web-typography-analyzer.onrender.com/highlight.png" width="100%">`;

    resultDiv.innerHTML = html;
}

</script>

</body>
</html>
