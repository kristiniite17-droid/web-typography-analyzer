<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tipografika</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  color: #111827;
}

.header {
  background: linear-gradient(135deg, #111827, #374151);
  color: white;
  padding: 42px 18px 72px;
  text-align: center;
}

.header h1 {
  margin: 0;
  font-size: 38px;
}

.header p {
  color: #d1d5db;
}

.container {
  max-width: 1180px;
  margin: -42px auto 50px;
  padding: 0 16px;
}

.panel {
  background: white;
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  margin-bottom: 24px;
}

.input-row {
  display: grid;
  grid-template-columns: 1fr 180px;
  gap: 14px;
}

input,
button {
  padding: 14px;
  border-radius: 12px;
  font-size: 16px;
}

input {
  border: 1px solid #e5e7eb;
}

button {
  border: none;
  background: #111827;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #374151;
}

.score-main {
  text-align: center;
}

.score-main h2 {
  color: #6b7280;
  font-size: 16px;
}

.score-main .number {
  font-size: 60px;
  font-weight: 800;
}

.viewport-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

.viewport-card {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 20px;
}

.viewport-card h3 {
  margin-top: 0;
}

.score {
  font-size: 42px;
  font-weight: 800;
  margin: 12px 0;
}

.good {
  color: #15803d;
}

.warning {
  color: #d97706;
}

.critical {
  color: #dc2626;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 14px;
}

.stat {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  border: 1px solid #e5e7eb;
}

.element {
  background: white;
  border-radius: 14px;
  border: 1px solid #e5e7eb;
  margin: 12px 0;
  padding: 14px;
}

.element.warning {
  border-left: 6px solid #d97706;
}

.element.critical {
  border-left: 6px solid #dc2626;
}

.element.good {
  border-left: 6px solid #15803d;
}

.metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 12px 0;
}

.metric {
  background: #f9fafb;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
}

.metric span {
  display: block;
  color: #6b7280;
  font-size: 12px;
}

.screenshot {
  width: 100%;
  border-radius: 12px;
  border: 2px solid #111827;
  margin-top: 12px;
}

@media (max-width: 850px) {
  .input-row,
  .viewport-grid,
  .metrics {
    grid-template-columns: 1fr;
  }

  .header h1 {
    font-size: 30px;
  }

  .score-main .number {
    font-size: 44px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Tipografika</h1>
  <p>Responsive typography analysis for Desktop, Tablet and Mobile</p>
</div>

<div class="container">

  <div class="panel">
    <div class="input-row">
      <input id="urlInput" placeholder="https://example.com">
      <button onclick="analyze()">Analyze</button>
    </div>
  </div>

  <div id="result"></div>

</div>

<script>
const API_URL = "https://web-typography-analyzer-production.up.railway.app";

async function analyze() {
  const url = document.getElementById("urlInput").value.trim();
  const result = document.getElementById("result");

  if (!url) {
    result.innerHTML = `<div class="panel">Please enter a URL.</div>`;
    return;
  }

  result.innerHTML = `<div class="panel">Analyzing responsive typography...</div>`;

  try {
    const res = await fetch(`${API_URL}/analyze?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    if (data.error) {
      result.innerHTML = `<div class="panel"><b>Error:</b> ${data.error}</div>`;
      return;
    }

    let html = `
      <div class="panel score-main">
        <h2>Overall Responsive Typography Score</h2>
        <div class="number">${data.score}/100</div>
      </div>

      <div class="viewport-grid">
    `;

    data.responsive.forEach(view => {
      html += `
        <div class="viewport-card">
          <h3>${view.viewport}</h3>
          <div class="score">${view.score}/100</div>

          <div class="stats">
            <div class="stat">
              <b class="good">${view.stats.good}</b><br>
              Good
            </div>
            <div class="stat">
              <b class="warning">${view.stats.warnings}</b><br>
              Warning
            </div>
            <div class="stat">
              <b class="critical">${view.stats.critical}</b><br>
              Critical
            </div>
          </div>
        </div>
      `;
    });

    html += `</div>`;

    data.responsive.forEach(view => {
      html += `
        <div class="panel">
          <h2>${view.viewport} detailed analysis</h2>
      `;

      view.data.slice(0, 10).forEach(el => {
        html += `
          <div class="element ${el.level}">
            <b>${el.tag}</b> — ${el.level.toUpperCase()}<br>
            <p>${el.text}</p>

            <div class="metrics">
              <div class="metric">
                <span>Font size</span>
                <b>${el.fontSize}px</b>
              </div>
              <div class="metric">
                <span>Line height</span>
                <b>${el.lineHeight}px</b>
              </div>
              <div class="metric">
                <span>Contrast</span>
                <b>${el.contrast ?? "N/A"}</b>
              </div>
              <div class="metric">
                <span>Alignment</span>
                <b>${el.alignment}</b>
              </div>
              <div class="metric">
                <span>Width</span>
                <b>${el.widthPx}px</b>
              </div>
              <div class="metric">
                <span>Chars / line</span>
                <b>${el.charsPerLine}</b>
              </div>
            </div>

            <b>Problems:</b><br>
            ${el.problems.length ? el.problems.join("<br>") : "No problems detected"}<br><br>

            <b>Recommendations:</b><br>
            ${el.fixes.length ? el.fixes.join("<br>") : "No changes needed"}
          </div>
        `;
      });

      html += `
          <h3>${view.viewport} screenshot</h3>
          <img class="screenshot" src="${API_URL}/${view.viewport.toLowerCase()}-highlight.png?time=${Date.now()}">
        </div>
      `;
    });

    result.innerHTML = html;

  } catch (error) {
    result.innerHTML = `<div class="panel"><b>Error:</b> ${error.message}</div>`;
  }
}
</script>

</body>
</html>
