<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Typography Analyzer</title>

<style>
body { font-family: Arial; background:#f5f5f5; }
.container { max-width:1000px; margin:auto; padding:20px; background:white; margin-top:40px; border-radius:10px; }

input, button { width:100%; padding:10px; margin-top:10px; }
button { background:black; color:white; cursor:pointer; }

.good { background:green; color:white; padding:10px; margin:10px 0; }
.warning { background:orange; color:black; padding:10px; margin:10px 0; }
.critical { background:red; color:white; padding:10px; margin:10px 0; }

.score { font-size:30px; margin:20px 0; }
</style>
</head>

<body>

<div class="container">

<h1>Ultimate Typography Analyzer 🚀</h1>

<input id="urlInput" placeholder="https://example.com">
<button onclick="analyze()">Analyze</button>
<button onclick="downloadPDF()">Download PDF Report</button>

<div id="result"></div>

</div>

<script>

async function analyze(){
    const url = document.getElementById("urlInput").value;
    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "Loading...";

    const res = await fetch("https://web-typography-analyzer-production.up.railway.app/analyze?url="+encodeURIComponent(url));
    const data = await res.json();

    if(data.error){
        resultDiv.innerHTML = data.error;
        return;
    }

    let html = `
    <div class="score">Score: ${data.score}/100</div>
    <p>Good: ${data.stats.good}</p>
    <p>Warnings: ${data.stats.warnings}</p>
    <p>Critical: ${data.stats.critical}</p>
    `;

    data.data.forEach(el=>{
        html += `
        <div class="${el.level}">
            <b>${el.tag}</b><br>
            "${el.text}"<br><br>

            Size: ${el.fontSize}<br>
            Line height: ${el.lineHeight}<br>
            Alignment: ${el.alignment}<br>
            Contrast: ${el.contrast}<br>
            Line length: ${el.lineLength}<br><br>

            <b>Problems:</b> ${el.problems.join(", ") || "None"}<br>
            <b>Fix:</b> ${el.fixes.join(", ") || "None"}
        </div>`;
    });

    html += `<h2>Highlight</h2>
    <img src="https://web-typography-analyzer-production.up.railway.app/highlight.png" width="100%">`;

    resultDiv.innerHTML = html;
}

function downloadPDF() {
    window.print();
}

</script>

</body>
</html>
