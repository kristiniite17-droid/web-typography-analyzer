<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typography Analyzer</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 1000px;
    margin: 40px auto;
    background: white;
    padding: 24px;
    border-radius: 12px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    box-sizing: border-box;
}

button {
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

.score {
    font-size: 30px;
    margin: 20px 0;
    font-weight: bold;
}

.good, .warning, .critical {
    padding: 14px;
    margin: 12px 0;
    border-radius: 8px;
}

.good {
    background: #1f8b4c;
    color: white;
}

.warning {
    background: #f2a93b;
    color: black;
}

.critical {
    background: #c73333;
    color: white;
}

.meta {
    margin-bottom: 12px;
}

.stats {
    background: #efefef;
    padding: 14px;
    border-radius: 8px;
    margin: 20px 0;
}

img {
    max-width: 100%;
    border: 2px solid #222;
    margin-top: 12px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Typography Analyzer</h1>

    <input id="urlInput" placeholder="https://example.com">
    <button onclick="analyze()">Analyze</button>
    <button onclick="downloadPDF()">Download PDF Report</button>

    <div id="result"></div>
</div>

<script>
async function analyze() {
    const url = document.getElementById("urlInput").value.trim();
    const resultDiv = document.getElementById("result");

    if (!url) {
        resultDiv.innerHTML = "<p>Please enter a URL.</p>";
        return;
    }

    resultDiv.innerHTML = "Loading...";

    try {
        const res = await fetch(
            "https://web-typography-analyzer-production.up.railway.app/analyze?url=" +
            encodeURIComponent(url)
        );

        const data = await res.json();

        if (data.error) {
            resultDiv.innerHTML = `<p><b>Error:</b> ${data.error}</p>`;
            return;
        }

        let html = `
            <div class="score">Score: ${data.score}/100</div>
            <div class="stats">
                <div><b>Total elements analyzed:</b> ${data.stats.total}</div>
                <div><b>Good:</b> ${data.stats.good}</div>
                <div><b>Warnings:</b> ${data.stats.warnings}</div>
                <div><b>Critical:</b> ${data.stats.critical}</div>
            </div>
        `;

        data.data.forEach(el => {
            html += `
                <div class="${el.level}">
                    <div class="meta"><b>${el.tag}</b></div>
                    <div><b>Element description:</b> "${el.text}"</div><br>

                    <div><b>Font size:</b> ${el.fontSize}px</div>
                    <div><b>Line height:</b> ${el.lineHeight}px</div>
                    <div><b>Alignment:</b> ${el.alignment}</div>
                    <div><b>Contrast:</b> ${el.contrast ?? "N/A"}</div>
                    <div><b>Element width:</b> ${el.widthPx}px</div>
                    <div><b>Estimated characters per line:</b> ${el.charsPerLine}</div>
                    <div><b>Bottom margin:</b> ${el.marginBottom}px</div><br>

                    <div><b>Problems:</b> ${el.problems.join(", ") || "None"}</div>
                    <div><b>Recommendation:</b> ${el.fixes.join(", ") || "No changes needed"}</div>
                </div>
            `;
        });

        html += `
            <h2>Visual Highlight</h2>
            <img src="https://web-typography-analyzer-production.up.railway.app/highlight.png" alt="Highlighted page screenshot">
        `;

        resultDiv.innerHTML = html;
    } catch (error) {
        resultDiv.innerHTML = `<p><b>Error:</b> ${error.message}</p>`;
    }
}

function downloadPDF() {
    window.print();
}
</script>

</body>
</html>
