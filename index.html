<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tipografika</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  color: #111827;
}

.header {
  background: linear-gradient(135deg, #111827, #374151);
  color: white;
  padding: 42px 18px 72px;
  text-align: center;
}

.header h1 {
  margin: 0;
  font-size: 38px;
}

.header p {
  color: #d1d5db;
}

.container {
  max-width: 1180px;
  margin: -42px auto 50px;
  padding: 0 16px;
}

.panel {
  background: white;
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  margin-bottom: 24px;
}

.input-row {
  display: grid;
  grid-template-columns: 1fr 180px;
  gap: 14px;
}

input,
button {
  padding: 14px;
  border-radius: 12px;
  font-size: 16px;
}

input {
  border: 1px solid #e5e7eb;
}

button {
  border: none;
  background: #111827;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #374151;
}

.score-main {
  text-align: center;
}

.score-main h2 {
  color: #6b7280;
  font-size: 16px;
}

.score-main .number {
  font-size: 60px;
  font-weight: 800;
}

.viewport-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

.viewport-card {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 20px;
}

.viewport-card h3 {
  margin-top: 0;
}

.score {
  font-size: 42px;
  font-weight: 800;
  margin: 12px 0;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 14px;
}

.stat {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  border: 1px solid #e5e7eb;
  cursor: pointer;
}

.stat:hover {
  transform: translateY(-2px);
}

.stat.active {
  outline: 3px solid #111827;
}

.good {
  color: #15803d;
}

.warning {
  color: #d97706;
}

.critical {
  color: #dc2626;
}

.category-block {
  margin-top: 18px;
  padding: 16px;
  border-radius: 14px;
  background: #f9fafb;
  border: 1px solid #e5e7eb;
}

.element {
  background: white;
  border-radius: 14px;
  border: 1px solid #e5e7eb;
  margin: 12px 0;
  padding: 14px;
}

.element.good {
  border-left: 6px solid #15803d;
}

.element.warning {
  border-left: 6px solid #d97706;
}

.element.critical {
  border-left: 6px solid #dc2626;
}

.metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 12px 0;
}

.metric {
  background: #f9fafb;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
}

.metric span {
  display: block;
  color: #6b7280;
  font-size: 12px;
}

.preview {
  width: 100%;
  max-height: 220px;
  object-fit: contain;
  border-radius: 12px;
  border: 2px solid #111827;
  margin-top: 10px;
  background: #f9fafb;
}

.screenshot-wrap {
  text-align: center;
}

.screenshot {
  width: 100%;
  max-width: 760px;
  max-height: 430px;
  object-fit: contain;
  border-radius: 12px;
  border: 2px solid #111827;
  margin-top: 12px;
  background: #f9fafb;
}

.small-text {
  color: #6b7280;
  font-size: 14px;
}

@media (max-width: 850px) {
  .input-row,
  .viewport-grid,
  .metrics {
    grid-template-columns: 1fr;
  }

  .header h1 {
    font-size: 30px;
  }

  .score-main .number {
    font-size: 44px;
  }

  .stats {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Tipografika</h1>
  <p>Responsive typography analysis for Desktop, Tablet and Mobile</p>
</div>

<div class="container">

  <div class="panel">
    <div class="input-row">
      <input id="urlInput" placeholder="https://example.com">
      <button onclick="analyze()">Analyze</button>
    </div>
  </div>

  <div id="result"></div>

</div>

<script>
const API_URL = "https://web-typography-analyzer-production.up.railway.app";

let appData = null;
let selectedFilters = {
  Desktop: "warning",
  Tablet: "warning",
  Mobile: "warning"
};

async function analyze() {
  const url = document.getElementById("urlInput").value.trim();
  const result = document.getElementById("result");

  if (!url) {
    result.innerHTML = `<div class="panel">Please enter a URL.</div>`;
    return;
  }

  result.innerHTML = `<div class="panel">Analyzing responsive typography...</div>`;

  try {
    const res = await fetch(`${API_URL}/analyze?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    if (data.error) {
      result.innerHTML = `<div class="panel"><b>Error:</b> ${data.error}</div>`;
      return;
    }

    appData = data;
    render();

  } catch (error) {
    result.innerHTML = `<div class="panel"><b>Error:</b> ${error.message}</div>`;
  }
}

function setFilter(viewport, filter) {
  selectedFilters[viewport] = filter;
  render();
}

function renderElements(view) {
  const filter = selectedFilters[view.viewport] || "warning";
  const elements = view.data.filter(el => el.level === filter);

  let html = `
    <div class="category-block">
      <h3>${filterLabel(filter)} elements (${elements.length})</h3>
      <p class="small-text">Click Good, Warning or Bad above to show elements from this category.</p>
  `;

  if (!elements.length) {
    html += `<p>No elements in this category.</p>`;
  }

  elements.forEach(el => {
    const preview = el.preview
      ? `${API_URL}${el.preview}?time=${Date.now()}`
      : null;

    html += `
      <div class="element ${el.level}">
        <b>${el.tag}</b> — ${filterLabel(el.level)}<br>
        <p>${el.text}</p>

        <div class="metrics">
          <div class="metric">
            <span>Font size</span>
            <b>${el.fontSize}px</b>
          </div>
          <div class="metric">
            <span>Line height</span>
            <b>${el.lineHeight}px</b>
          </div>
          <div class="metric">
            <span>Contrast</span>
            <b>${el.contrast ?? "N/A"}</b>
          </div>
          <div class="metric">
            <span>Alignment</span>
            <b>${el.alignment}</b>
          </div>
          <div class="metric">
            <span>Width</span>
            <b>${el.widthPx}px</b>
          </div>
          <div class="metric">
            <span>Chars / line</span>
            <b>${el.charsPerLine}</b>
          </div>
        </div>

        <b>Problems:</b><br>
        ${el.problems.length ? el.problems.join("<br>") : "No problems detected"}<br><br>

        <b>Recommendations:</b><br>
        ${el.fixes.length ? el.fixes.join("<br>") : "No changes needed"}

        ${preview ? `
          <h4>Small element highlight</h4>
          <img class="preview" src="${preview}" alt="Element preview">
        ` : ""}
      </div>
    `;
  });

  html += `</div>`;
  return html;
}

function filterLabel(level) {
  if (level === "critical") return "Bad";
  if (level === "warning") return "Warning";
  return "Good";
}

function render() {
  if (!appData) return;

  let html = `
    <div class="panel score-main">
      <h2>Overall Responsive Typography Score</h2>
      <div class="number">${appData.score}/100</div>
    </div>

    <div class="viewport-grid">
  `;

  appData.responsive.forEach(view => {
    const current = selectedFilters[view.viewport];

    html += `
      <div class="viewport-card">
        <h3>${view.viewport}</h3>
        <div class="score">${view.score}/100</div>

        <div class="stats">
          <div class="stat ${current === "good" ? "active" : ""}" onclick="setFilter('${view.viewport}', 'good')">
            <b class="good">${view.stats.good}</b><br>
            Good
          </div>
          <div class="stat ${current === "warning" ? "active" : ""}" onclick="setFilter('${view.viewport}', 'warning')">
            <b class="warning">${view.stats.warnings}</b><br>
            Warning
          </div>
          <div class="stat ${current === "critical" ? "active" : ""}" onclick="setFilter('${view.viewport}', 'critical')">
            <b class="critical">${view.stats.critical}</b><br>
            Bad
          </div>
        </div>

        ${renderElements(view)}
      </div>
    `;
  });

  html += `</div>`;

  appData.responsive.forEach(view => {
    html += `
      <div class="panel screenshot-wrap">
        <h2>${view.viewport} overall highlight</h2>
        <p class="small-text">Reduced full-page screenshot with highlighted typography elements.</p>
        <img class="screenshot" src="${API_URL}/${view.viewport.toLowerCase()}-highlight.png?time=${Date.now()}">
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
