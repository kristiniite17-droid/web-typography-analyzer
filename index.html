<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Typography</title>

<style>
:root {
  --dark: #07111f;
  --card: #ffffff;
  --bg: #f5f7fb;
  --border: #e5e7eb;
  --text: #111827;
  --muted: #64748b;
  --purple: #6d28d9;
  --good: #059669;
  --warning: #f59e0b;
  --bad: #ef4444;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
  background: linear-gradient(180deg, #07111f 0, #07111f 120px, var(--bg) 120px);
  color: var(--text);
}

.header {
  max-width: 1180px;
  margin: 0 auto;
  padding: 24px 18px;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-box {
  display: flex;
  gap: 14px;
  align-items: center;
}

.logo {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, #7c3aed, #312e81);
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 30px;
  font-weight: 900;
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

.header p {
  margin: 4px 0 0;
  color: #cbd5e1;
}

.header-features {
  display: flex;
  gap: 24px;
  color: #cbd5e1;
  font-size: 13px;
}

.container {
  max-width: 1180px;
  margin: 0 auto 60px;
  padding: 0 18px;
}

.panel {
  background: white;
  border-radius: 16px;
  padding: 22px;
  border: 1px solid var(--border);
  box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
  margin-bottom: 22px;
}

.input-row {
  display: grid;
  grid-template-columns: 1fr 210px 210px;
  gap: 14px;
}

input, button {
  padding: 15px;
  border-radius: 10px;
  font-size: 15px;
}

input {
  border: 1px solid var(--border);
}

button {
  border: none;
  cursor: pointer;
  background: var(--purple);
  color: white;
  font-weight: 700;
}

.secondary {
  background: white;
  color: var(--text);
  border: 1px solid var(--border);
}

.summary-grid {
  display: grid;
  grid-template-columns: 1.2fr repeat(3, 1fr);
  gap: 18px;
  margin-bottom: 24px;
}

.summary-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px;
  box-shadow: 0 10px 25px rgba(15, 23, 42, 0.05);
}

.big-score {
  text-align: center;
}

.big-score .circle {
  width: 130px;
  height: 130px;
  margin: 12px auto;
  border-radius: 50%;
  border: 12px solid #ddd6fe;
  display: grid;
  place-items: center;
  font-size: 36px;
  font-weight: 900;
  color: var(--dark);
}

.device-score {
  font-size: 34px;
  font-weight: 900;
  margin: 10px 0;
}

.device-tabs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: white;
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 14px;
}

.device-tab {
  padding: 18px;
  text-align: center;
  cursor: pointer;
  font-weight: 700;
  border-right: 1px solid var(--border);
}

.device-tab:last-child {
  border-right: none;
}

.device-tab.active {
  color: var(--purple);
  background: #f5f3ff;
  outline: 2px solid var(--purple);
  outline-offset: -2px;
}

.analysis-layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 18px;
}

.left-panel,
.right-panel {
  background: white;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
}

.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 14px 0;
}

.filter {
  padding: 10px 14px;
  border-radius: 8px;
  background: #f8fafc;
  border: 1px solid var(--border);
  cursor: pointer;
  font-weight: 700;
}

.filter.active {
  outline: 2px solid var(--purple);
  color: var(--purple);
}

.issue-list {
  max-height: 760px;
  overflow-y: auto;
  padding-right: 4px;
}

.issue {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
  cursor: pointer;
}

.issue.active {
  outline: 2px solid var(--purple);
}

.issue.good {
  background: #ecfdf5;
  border-color: #bbf7d0;
}

.issue.warning {
  background: #fffbeb;
  border-color: #fde68a;
}

.issue.critical {
  background: #fef2f2;
  border-color: #fecaca;
}

.badge {
  display: inline-block;
  padding: 5px 9px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 800;
}

.badge.good {
  background: #d1fae5;
  color: var(--good);
}

.badge.warning {
  background: #fef3c7;
  color: #d97706;
}

.badge.critical {
  background: #fee2e2;
  color: var(--bad);
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 220px;
  gap: 18px;
  margin: 18px 0;
}

.detail-box {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  background: #fcfcfd;
}

.preview {
  width: 100%;
  max-height: 220px;
  object-fit: contain;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #f8fafc;
}

.page-highlight-small {
  width: 100%;
  max-height: 300px;
  object-fit: cover;
  object-position: top;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: #f8fafc;
  cursor: pointer;
}

.highlight-open-btn {
  margin-top: 12px;
  width: 100%;
  background: var(--purple);
}

.cookie-status {
  margin-top: 22px;
  background: #f5f3ff;
  border: 1px solid #ddd6fe;
  border-radius: 14px;
  padding: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.accepted {
  background: #dcfce7;
  color: #166534;
  padding: 8px 12px;
  border-radius: 8px;
  font-weight: 700;
}

.muted {
  color: var(--muted);
}

.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  inset: 0;
  background: rgba(2, 6, 23, 0.88);
  padding: 28px;
}

.modal.open {
  display: block;
}

.modal-content {
  background: white;
  border-radius: 18px;
  padding: 18px;
  max-width: 1200px;
  height: 90vh;
  margin: 0 auto;
  overflow: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.modal-header h2 {
  margin: 0;
}

.close-btn {
  background: #111827;
  padding: 10px 16px;
}

.full-highlight-img {
  width: 100%;
  border-radius: 14px;
  border: 2px solid #111827;
}

@media (max-width: 950px) {
  .header,
  .header-features {
    display: block;
  }

  .header-features {
    margin-top: 16px;
  }

  .input-row,
  .summary-grid,
  .analysis-layout,
  .detail-grid {
    grid-template-columns: 1fr;
  }

  .device-tabs {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo-box">
    <div class="logo">T</div>
    <div>
      <h1>Typography</h1>
      <p>Responsive Typography Analyzer</p>
    </div>
  </div>

  <div class="header-features">
    <div>Accurate Analysis</div>
    <div>Responsive 3 Breakpoints</div>
    <div>Actionable Recommendations</div>
  </div>
</div>

<div class="container">
  <div class="panel">
    <label>Website URL</label>
    <div class="input-row">
      <input id="urlInput" placeholder="https://example.com">
      <button onclick="analyze()">Analyze Website</button>
      <button class="secondary" onclick="window.print()">Export Report</button>
    </div>
  </div>

  <div id="result"></div>
</div>

<div id="highlightModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="highlightModalTitle">Full page highlight</h2>
      <button class="close-btn" onclick="closeHighlightModal()">Close</button>
    </div>

    <img id="highlightModalImg" class="full-highlight-img" src="" alt="Full page highlight">
  </div>
</div>

<script>
const API_URL = "https://web-typography-analyzer-production.up.railway.app";

let appData = null;
let activeDevice = "Desktop";
let activeFilter = "all";
let selectedIssueId = null;

async function analyze() {
  const url = document.getElementById("urlInput").value.trim();
  const result = document.getElementById("result");

  if (!url) {
    result.innerHTML = `<div class="panel">Please enter a valid URL.</div>`;
    return;
  }

  result.innerHTML = `<div class="panel">Analyzing responsive typography...</div>`;

  try {
    const res = await fetch(`${API_URL}/analyze?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    if (data.error) {
      result.innerHTML = `<div class="panel"><b>Error:</b> ${data.error}</div>`;
      return;
    }

    appData = data;
    activeDevice = "Desktop";
    activeFilter = "all";

    const firstView = getView();
    selectedIssueId = firstView.data[0]?.id || null;

    render();
  } catch (error) {
    result.innerHTML = `<div class="panel"><b>Error:</b> ${error.message}</div>`;
  }
}

function getView() {
  return appData.responsive.find(v => v.viewport === activeDevice);
}

function getSelectedIssue() {
  const view = getView();
  return view.data.find(i => i.id === selectedIssueId) || view.data[0];
}

function setDevice(device) {
  activeDevice = device;
  activeFilter = "all";
  const view = getView();
  selectedIssueId = view.data[0]?.id || null;
  render();
}

function setFilter(filter) {
  activeFilter = filter;
  const view = getView();
  const list = filter === "all" ? view.data : view.data.filter(i => i.level === filter);
  selectedIssueId = list[0]?.id || view.data[0]?.id || null;
  render();
}

function selectIssue(id) {
  selectedIssueId = id;
  render();
}

function levelLabel(level) {
  if (level === "critical") return "Bad";
  if (level === "warning") return "Warning";
  return "Good";
}

function openHighlightModal(src, viewport) {
  const modal = document.getElementById("highlightModal");
  const img = document.getElementById("highlightModalImg");
  const title = document.getElementById("highlightModalTitle");

  title.innerText = `${viewport} full page highlight`;
  img.src = src;
  modal.classList.add("open");
}

function closeHighlightModal() {
  document.getElementById("highlightModal").classList.remove("open");
}

function renderSummary() {
  let html = `
    <div class="summary-grid">
      <div class="summary-card big-score">
        <h3>Overall Typography Score</h3>
        <div class="circle">${appData.score}<small>/100</small></div>
        <p class="muted">Good job! Keep improving.</p>
      </div>
  `;

  appData.responsive.forEach(view => {
    html += `
      <div class="summary-card">
        <h3>${view.viewport}</h3>
        <div class="device-score">${view.score}<small>/100</small></div>
        <p class="muted">${view.stats.good} Good · ${view.stats.warnings} Warning · ${view.stats.critical} Bad</p>
      </div>
    `;
  });

  html += `</div>`;
  return html;
}

function renderTabs() {
  return `
    <div class="device-tabs">
      ${["Desktop", "Tablet", "Mobile"].map(device => `
        <div class="device-tab ${activeDevice === device ? "active" : ""}" onclick="setDevice('${device}')">
          ${device}
        </div>
      `).join("")}
    </div>
  `;
}

function renderLeftPanel(view) {
  const filtered = activeFilter === "all"
    ? view.data
    : view.data.filter(i => i.level === activeFilter);

  return `
    <div class="left-panel">
      <h3>Found ${view.stats.total} elements</h3>

      <div class="filter-row">
        <div class="filter ${activeFilter === "all" ? "active" : ""}" onclick="setFilter('all')">All ${view.stats.total}</div>
        <div class="filter ${activeFilter === "good" ? "active" : ""}" onclick="setFilter('good')">Good ${view.stats.good}</div>
        <div class="filter ${activeFilter === "warning" ? "active" : ""}" onclick="setFilter('warning')">Warning ${view.stats.warnings}</div>
        <div class="filter ${activeFilter === "critical" ? "active" : ""}" onclick="setFilter('critical')">Bad ${view.stats.critical}</div>
      </div>

      <div class="issue-list">
        ${filtered.map(issue => `
          <div class="issue ${issue.level} ${selectedIssueId === issue.id ? "active" : ""}" onclick="selectIssue('${issue.id}')">
            <span class="badge ${issue.level}">${levelLabel(issue.level)}</span>
            <b>${issue.tag}</b>
            <p>${issue.text}</p>
            <small>
              Font: ${issue.fontSize}px · Line: ${issue.lineHeight}px · Contrast: ${issue.contrast ?? "N/A"}
            </small>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function renderRightPanel(issue, view) {
  const preview = issue?.preview
    ? `${API_URL}${issue.preview}?time=${Date.now()}`
    : null;

  const pageHighlight = `${API_URL}/${view.viewport.toLowerCase()}-highlight.png?time=${Date.now()}`;

  return `
    <div class="right-panel">
      ${issue ? `
        <h2>${issue.tag} Element <span class="badge ${issue.level}">${levelLabel(issue.level)}</span></h2>
        <p class="muted">Element ID: ${issue.id}</p>

        <div class="detail-grid">
          <div class="detail-box">
            <h4>Problems</h4>
            ${issue.problems.length ? issue.problems.map(p => `<p>❌ ${p}</p>`).join("") : "<p>✅ No problems detected.</p>"}
          </div>

          <div class="detail-box">
            <h4>Recommendations</h4>
            ${issue.fixes.length ? issue.fixes.map(f => `<p>✅ ${f}</p>`).join("") : "<p>No changes needed.</p>"}
          </div>

          <div class="detail-box">
            <h4>Metrics</h4>
            <p>Font size: <b>${issue.fontSize}px</b></p>
            <p>Line height: <b>${issue.lineHeight}px</b></p>
            <p>Contrast: <b>${issue.contrast ?? "N/A"}</b></p>
            <p>Alignment: <b>${issue.alignment}</b></p>
          </div>
        </div>

        <h3>Element preview</h3>
        ${preview ? `<img class="preview" src="${preview}">` : `<p>No preview available.</p>`}
      ` : `<p>No selected issue.</p>`}

      <h3>Page highlight (${view.viewport})</h3>
      <p class="muted">Click the preview or button to open the full highlighted page screenshot.</p>

      <img 
        class="page-highlight-small" 
        src="${pageHighlight}" 
        onclick="openHighlightModal('${pageHighlight}', '${view.viewport}')"
        alt="Page highlight"
      >

      <button class="highlight-open-btn" onclick="openHighlightModal('${pageHighlight}', '${view.viewport}')">
        Open full page highlight
      </button>
    </div>
  `;
}

function render() {
  if (!appData) return;

  const view = getView();
  const issue = getSelectedIssue();

  document.getElementById("result").innerHTML = `
    ${renderSummary()}
    ${renderTabs()}

    <div class="analysis-layout">
      ${renderLeftPanel(view)}
      ${renderRightPanel(issue, view)}
    </div>

    <div class="cookie-status">
      <div>
        <b>Cookie/Privacy banner</b><br>
        <span class="muted">Automatically accepted or hidden to ensure clean screenshots.</span>
      </div>
      <div class="accepted">✓ Accepted</div>
    </div>
  `;
}
</script>

</body>
</html>
