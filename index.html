<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Typography Analyzer</title>
</head>

<body>

<h1>Typography Analyzer</h1>

<input id="url" placeholder="https://example.com">
<button onclick="analyze()">Analyze</button>

<div id="out"></div>

<script>

async function analyze(){
    const url = document.getElementById("url").value;

    const res = await fetch("https://web-typography-analyzer-production.up.railway.app/analyze?url=" + encodeURIComponent(url));
    const data = await res.json();

    let html = "";

    if(data.error){
        html = "<b>Error:</b> " + data.error;
    } else {
        html = `<h2>Score: ${data.score}/100</h2>`;

        data.result.forEach(el => {
            html += `
            <div>
                <b>${el.tag}</b><br>
                "${el.text}"<br>
                Font size: ${el.fontSize}<br>
                Status: ${el.status}
            </div><hr>`;
        });
    }

    document.getElementById("out").innerHTML = html;
}

</script>

</body>
</html>
