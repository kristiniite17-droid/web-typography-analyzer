<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tipografika</title>

<style>
:root {
    --bg: #f3f4f6;
    --card: #ffffff;
    --dark: #1f2937;
    --dark2: #111827;
    --text: #111827;
    --muted: #6b7280;
    --border: #e5e7eb;
    --good: #15803d;
    --warning: #d97706;
    --critical: #dc2626;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.header {
    background: linear-gradient(135deg, #111827, #374151);
    color: white;
    padding: 42px 18px 72px;
    text-align: center;
}

.header h1 {
    margin: 0;
    font-size: 38px;
}

.header p {
    margin: 12px auto 0;
    max-width: 700px;
    color: #e5e7eb;
    font-size: 17px;
}

.container {
    width: 100%;
    max-width: 1180px;
    margin: -42px auto 50px;
    padding: 0 16px;
}

.panel {
    background: var(--card);
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    margin-bottom: 24px;
}

.input-row {
    display: grid;
    grid-template-columns: 1fr 190px;
    gap: 14px;
}

input {
    width: 100%;
    padding: 15px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
}

button {
    padding: 15px 16px;
    background: var(--dark2);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #374151;
}

.secondary-btn {
    margin-top: 14px;
    background: #4b5563;
}

.score-card {
    text-align: center;
}

.score-label {
    color: var(--muted);
    font-size: 16px;
}

.score-number {
    font-size: 62px;
    font-weight: 800;
    margin: 12px 0 24px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
}

.stat-card {
    background: #f9fafb;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    transition: 0.2s;
}

.stat-card:hover {
    transform: translateY(-2px);
}

.stat-card.active {
    outline: 3px solid var(--dark2);
}

.stat-card h3 {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
}

.stat-card div {
    font-size: 30px;
    font-weight: bold;
    margin-top: 10px;
}

.good-text { color: var(--good); }
.warning-text { color: var(--warning); }
.critical-text { color: var(--critical); }

.section-title {
    font-size: 24px;
    margin: 28px 0 16px;
}

.result-card {
    background: white;
    border-radius: 16px;
    border: 1px solid var(--border);
    margin-bottom: 18px;
    overflow: hidden;
}

.result-header {
    padding: 16px 18px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    font-weight: bold;
}

.good .result-header { border-left: 6px solid var(--good); }
.warning .result-header { border-left: 6px solid var(--warning); }
.critical .result-header { border-left: 6px solid var(--critical); }

.badge {
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    white-space: nowrap;
}

.badge.good {
    background: #dcfce7;
    color: var(--good);
}

.badge.warning {
    background: #fef3c7;
    color: var(--warning);
}

.badge.critical {
    background: #fee2e2;
    color: var(--critical);
}

.result-body {
    padding: 18px;
}

.result-body p {
    line-height: 1.5;
    word-break: break-word;
}

.metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 16px 0;
}

.metric {
    background: #f9fafb;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px;
    min-width: 0;
}

.metric span {
    display: block;
    color: var(--muted);
    font-size: 12px;
}

.metric strong {
    display: block;
    margin-top: 5px;
    word-break: break-word;
}

.issue-box {
    background: #f9fafb;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-top: 12px;
    line-height: 1.45;
    word-break: break-word;
}

.small-btn {
    width: auto;
    margin-top: 12px;
    padding: 10px 14px;
    font-size: 14px;
}

.details {
    display: none;
    margin-top: 14px;
    padding: 14px;
    background: #f3f4f6;
    border: 1px solid var(--border);
    border-radius: 12px;
    line-height: 1.45;
}

.details.open {
    display: block;
}

.preview-img {
    max-width: 100%;
    margin-top: 12px;
    border: 2px solid var(--dark2);
    border-radius: 10px;
}

.screenshot {
    width: 100%;
    max-width: 100%;
    border: 2px solid var(--dark2);
    border-radius: 12px;
    margin-top: 12px;
}

.loading {
    text-align: center;
    font-size: 18px;
    color: var(--muted);
    padding: 34px;
}

@media (max-width: 900px) {
    .cards {
        grid-template-columns: repeat(2, 1fr);
    }

    .metrics {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 600px) {
    .header {
        padding: 34px 16px 64px;
    }

    .header h1 {
        font-size: 32px;
    }

    .header p {
        font-size: 14px;
        line-height: 1.4;
    }

    .container {
        padding: 0 10px;
        margin-top: -38px;
    }

    .panel {
        padding: 16px;
        border-radius: 14px;
    }

    .input-row {
        grid-template-columns: 1fr;
    }

    input,
    button {
        font-size: 15px;
        padding: 14px;
    }

    .secondary-btn {
        width: 100%;
    }

    .score-number {
        font-size: 46px;
    }

    .cards {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .stat-card {
        padding: 14px;
    }

    .stat-card div {
        font-size: 24px;
    }

    .section-title {
        font-size: 20px;
        margin-left: 4px;
    }

    .result-header {
        align-items: flex-start;
        padding: 14px;
    }

    .result-body {
        padding: 14px;
    }

    .metrics {
        grid-template-columns: 1fr;
        gap: 8px;
    }

    .issue-box {
        font-size: 14px;
    }

    .small-btn {
        width: 100%;
    }
}

@media (max-width: 380px) {
    .cards {
        grid-template-columns: 1fr;
    }

    .score-number {
        font-size: 40px;
    }
}

@media print {
    input,
    button {
        display: none;
    }

    .container {
        margin: 0;
        padding: 0;
    }

    .panel {
        box-shadow: none;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>Tipografika</h1>
    <p>Automated typography, readability and accessibility audit for web pages</p>
</div>

<div class="container">

    <div class="panel">
        <div class="input-row">
            <input id="urlInput" placeholder="https://example.com">
            <button onclick="analyze()">Analyze</button>
        </div>

        <button class="secondary-btn" onclick="downloadPDF()">Download PDF Report</button>
    </div>

    <div id="result"></div>

</div>

<script>
const API_URL = "https://web-typography-analyzer-production.up.railway.app";

let currentData = null;
let currentFilter = "all";

async function analyze() {
    const url = document.getElementById("urlInput").value.trim();
    const resultDiv = document.getElementById("result");

    if (!url) {
        resultDiv.innerHTML = `<div class="panel">Please enter a valid URL.</div>`;
        return;
    }

    resultDiv.innerHTML = `<div class="panel loading">Analyzing website typography...</div>`;

    try {
        const res = await fetch(`${API_URL}/analyze?url=${encodeURIComponent(url)}`);
        const data = await res.json();

        if (data.error) {
            resultDiv.innerHTML = `<div class="panel"><b>Error:</b> ${data.error}</div>`;
            return;
        }

        currentData = data;
        currentFilter = "all";
        renderResults();

    } catch (error) {
        resultDiv.innerHTML = `<div class="panel"><b>Error:</b> ${error.message}</div>`;
    }
}

function setFilter(filter) {
    currentFilter = filter;
    renderResults();
}

function renderResults() {
    if (!currentData) return;

    const data = currentData;

    const filtered = currentFilter === "all"
        ? data.data
        : data.data.filter(el => el.level === currentFilter);

    let html = `
        <div class="panel score-card">
            <div class="score-label">Overall Typography Score</div>
            <div class="score-number">${data.score}/100</div>

            <div class="cards">
                <div class="stat-card ${currentFilter === "all" ? "active" : ""}" onclick="setFilter('all')">
                    <h3>All Elements</h3>
                    <div>${data.stats.total}</div>
                </div>

                <div class="stat-card ${currentFilter === "good" ? "active" : ""}" onclick="setFilter('good')">
                    <h3>Good</h3>
                    <div class="good-text">${data.stats.good}</div>
                </div>

                <div class="stat-card ${currentFilter === "warning" ? "active" : ""}" onclick="setFilter('warning')">
                    <h3>Warnings</h3>
                    <div class="warning-text">${data.stats.warnings}</div>
                </div>

                <div class="stat-card ${currentFilter === "critical" ? "active" : ""}" onclick="setFilter('critical')">
                    <h3>Critical</h3>
                    <div class="critical-text">${data.stats.critical}</div>
                </div>
            </div>
        </div>

        <h2 class="section-title">Detailed Element Analysis (${filtered.length})</h2>
    `;

    filtered.forEach((el, index) => {
        const detailsId = `details-${index}-${el.id}`;
        const previewUrl = el.preview ? `${API_URL}${el.preview}?time=${Date.now()}` : null;

        html += `
            <div class="result-card ${el.level}">
                <div class="result-header">
                    <span>${index + 1}. ${el.tag}</span>
                    <span class="badge ${el.level}">${el.level}</span>
                </div>

                <div class="result-body">
                    <p><b>Element description:</b> "${el.text}"</p>

                    <div class="metrics">
                        <div class="metric">
                            <span>Font size</span>
                            <strong>${el.fontSize}px</strong>
                        </div>

                        <div class="metric">
                            <span>Line height</span>
                            <strong>${el.lineHeight}px</strong>
                        </div>

                        <div class="metric">
                            <span>Alignment</span>
                            <strong>${el.alignment}</strong>
                        </div>

                        <div class="metric">
                            <span>Contrast</span>
                            <strong>${el.contrast ?? "N/A"}</strong>
                        </div>

                        <div class="metric">
                            <span>Element width</span>
                            <strong>${el.widthPx}px</strong>
                        </div>

                        <div class="metric">
                            <span>Characters per line</span>
                            <strong>${el.charsPerLine}</strong>
                        </div>
                    </div>

                    <div class="issue-box">
                        <b>Problems</b><br>
                        ${el.problems.length ? el.problems.join("<br>") : "No problems detected"}
                    </div>

                    <div class="issue-box">
                        <b>Recommendations</b><br>
                        ${el.fixes.length ? el.fixes.join("<br>") : "No changes needed"}
                    </div>

                    <button class="small-btn" onclick="toggleDetails('${detailsId}')">More details</button>

                    <div id="${detailsId}" class="details">
                        <b>Why this matters:</b><br>
                        ${el.details && el.details.length ? el.details.join("<br>") : "This element follows the defined typography rules."}

                        ${previewUrl ? `
                            <h4>Element preview</h4>
                            <img class="preview-img" src="${previewUrl}" alt="Element preview">
                        ` : `
                            <p><i>Preview is available only for warning and critical elements.</i></p>
                        `}
                    </div>
                </div>
            </div>
        `;
    });

    html += `
        <h2 class="section-title">Visual Highlight</h2>
        <div class="panel">
            <p>Problematic elements are highlighted directly on the analyzed page screenshot.</p>
            <img class="screenshot" src="${API_URL}/highlight.png?time=${Date.now()}" alt="Highlighted page screenshot">
        </div>
    `;

    document.getElementById("result").innerHTML = html;
}

function toggleDetails(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle("open");
}

function downloadPDF() {
    window.print();
}
</script>

</body>
</html>
